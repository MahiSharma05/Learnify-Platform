server:
  port: 8085   # Assessment Service

spring:
  application:
    name: assessment-service

  datasource:
    url: jdbc:mysql://localhost:3306/assessment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Dimple@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Redis (Quiz Timer State + Caching) ────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 300000       # 5 minutes default TTL
      cache-null-values: false

  # ── RabbitMQ — Publish QUIZ_SUBMITTED event ───────────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 60000
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: learnify-super-secret-key-must-be-at-least-32-characters-long

# ── Quiz Timer Redis Key Pattern ──────────────────────────────────────────────
# Key format : quiz:timer:<attemptId>
# Value      : JSON { quizId, studentId, startedAt, timeLimitSeconds, answers }
# TTL        : timeLimitSeconds + 60 seconds grace period
# ─────────────────────────────────────────────────────────────────────────────
quiz:
  timer:
    grace-seconds: 60     # Extra seconds after time limit before auto-submit