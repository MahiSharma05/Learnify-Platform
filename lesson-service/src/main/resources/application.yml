server:
  port: 8083   # Lesson Service runs on port 8083

spring:
  application:
    name: lesson-service   # MUST match Eureka + Gateway routing

  datasource:
    url: jdbc:mysql://localhost:3306/lesson_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Dimple@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update       # Auto create/update tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# Eureka Service Registration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# JWT secret (same as gateway — used to extract user info from header context)
jwt:
  secret: learnify-super-secret-key-must-be-at-least-32-characters-long