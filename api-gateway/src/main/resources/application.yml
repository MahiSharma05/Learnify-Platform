  server:
    port: ${PORT:8080}                                                  #8080

  spring:
    application:
      name: api-gateway

    cloud:
      gateway:

        # CORS CONFIG (VERY IMPORTANT)
        globalcors:
          corsConfigurations:
            '[/**]':
              allowedOrigins:
                - "http://localhost:4200"
              allowedMethods:
                - GET
                - POST
                - PUT
                - DELETE
                - OPTIONS
              allowedHeaders: "*"
              allowCredentials: true

        routes:
          # ================= AUTH SERVICE =================
          - id: auth-service
            uri: lb://auth-service
            predicates:
              - Path=/api/auth/**, /oauth2/**

          # ================= COURSE SERVICE =================
          - id: course-service
            uri: lb://course-service
            predicates:
              - Path=/api/courses/**

          # ================= LESSON SERVICE =================
          - id: lesson-service
            uri: lb://lesson-service
            predicates:
              - Path=/api/lessons/**

          # ================= ENROLLMENT SERVICE =================
          - id: enrollment-service
            uri: lb://enrollment-service
            predicates:
              - Path=/api/enrollments/**

          # ================= ASSESSMENT SERVICE =================
          - id: assessment-service-quizzes
            uri: lb://assessment-service
            predicates:
              - Path=/api/quizzes/**

          - id: assessment-service-attempts
            uri: lb://assessment-service
            predicates:
              - Path=/api/attempts/**

          # ================= PAYMENT SERVICE =================
          - id: payment-service-payments
            uri: lb://payment-service
            predicates:
              - Path=/api/payments/**

          - id: payment-service-subscriptions
            uri: lb://payment-service
            predicates:
              - Path=/api/subscriptions/**

          # ================= PROGRESS SERVICE =================
          - id: progress-service-progress
            uri: lb://progress-service
            predicates:
              - Path=/api/progress/**

          - id: progress-service-certificates
            uri: lb://progress-service
            predicates:
              - Path=/api/certificates/**

          # ================= DISCUSSION SERVICE =================
          - id: discussion-service-threads
            uri: lb://discussion-service
            predicates:
              - Path=/api/threads/**

          - id: discussion-service-replies
            uri: lb://discussion-service
            predicates:
              - Path=/api/replies/**

          # ================= NOTIFICATION SERVICE =================
          - id: notification-service
            uri: lb://notification-service
            predicates:
              - Path=/api/notifications/**


  eureka:
    client:
      service-url:
        defaultZone: https://learnify-eureka.onrender.com/eureka          #defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true


  jwt:
    secret: learnify-super-secret-key-must-be-at-least-32-characters-long

