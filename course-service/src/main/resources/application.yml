server:
  port: 8082   # Course Service

spring:
  application:
    name: course-service

  datasource:
    url: jdbc:mysql://localhost:3306/course_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Dimple@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Redis Cache Configuration ─────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cache:
    type: redis
    redis:
      time-to-live: 600000       # 10 minutes (in ms) — cache TTL for course data
      cache-null-values: false

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: learnify-super-secret-key-must-be-at-least-32-characters-long

# ── Cache key names (for reference / documentation) ──────────────────────────
# getAllCourses      → cache: "courses"       key: "all"
# getCourseById      → cache: "courses"       key: "#id"
# getFeaturedCourses → cache: "courses"       key: "featured"
# searchCourses      → cache: "courseSearch"  key: "#keyword"
# getByCategory      → cache: "courses"       key: "'cat_' + #category"