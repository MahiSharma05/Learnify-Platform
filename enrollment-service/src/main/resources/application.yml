server:
  port: 8084   # Enrollment Service

spring:
  application:
    name: enrollment-service

  datasource:
    url: jdbc:mysql://localhost:3306/enrollment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Dimple@123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # ── RabbitMQ — Publish ENROLLMENT_CREATED event ───────────────────────────
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 60000

    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2

  devtools:
    restart:
      enabled: true

    livereload:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs

  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

jwt:
  secret: learnify-super-secret-key-must-be-at-least-32-characters-long